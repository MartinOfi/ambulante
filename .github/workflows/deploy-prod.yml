name: Deploy to Production

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

permissions:
  contents: read

env:
  SUPABASE_CLI_VERSION: 2.95.5
  NODE_VERSION: "20.19.0"
  PNPM_VERSION: "10.33.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # PR: preview migrations + E2E
  #
  # Tries Supabase Branching (Pro plan) when SUPABASE_ACCESS_TOKEN and
  # SUPABASE_PROJECT_ID are set. Falls back to a local Docker instance otherwise.
  # ─────────────────────────────────────────────────────────────────────────────
  preview:
    name: Preview DB (migrations + E2E)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      LOCAL_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      CRON_SECRET: ci-dummy-cron-secret-not-used-for-real
      E2E_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # ── Attempt Supabase Branching (Pro plan) ─────────────────────────────
      # Each PR gets an isolated Supabase project to test migrations against.
      # On any failure (not on Pro, CLI incompatibility, etc.) sets ok=false so
      # the Docker fallback kicks in below. Never exits non-zero itself.
      - name: Try Supabase preview branch
        id: try-branch
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_ID != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="pr-${PR_NUMBER}"

          BRANCH_JSON=$(supabase branches create "$BRANCH" \
            --experimental \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --output json 2>/dev/null) \
            || { echo "ok=false" >> "$GITHUB_OUTPUT"; exit 0; }

          BRANCH_REF=$(echo "$BRANCH_JSON" | jq -re '.project_ref // .ref // empty' 2>/dev/null)
          [ -z "$BRANCH_REF" ] && { echo "ok=false" >> "$GITHUB_OUTPUT"; exit 0; }

          # Fetch API credentials via Management API
          KEYS=$(curl -sf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$BRANCH_REF/api-keys") \
            || { echo "ok=false" >> "$GITHUB_OUTPUT"; exit 0; }

          ANON_KEY=$(echo "$KEYS" | jq -re '.[] | select(.name == "anon") | .api_key' 2>/dev/null)
          SERVICE_KEY=$(echo "$KEYS" | jq -re '.[] | select(.name == "service_role") | .api_key' 2>/dev/null)
          [ -z "$ANON_KEY" ] && { echo "ok=false" >> "$GITHUB_OUTPUT"; exit 0; }

          # Mask secrets before writing to outputs so they don't appear in logs
          echo "::add-mask::$ANON_KEY"
          echo "::add-mask::$SERVICE_KEY"

          {
            echo "branch_name=$BRANCH"
            echo "branch_ref=$BRANCH_REF"
            echo "api_url=https://${BRANCH_REF}.supabase.co"
            echo "anon_key=$ANON_KEY"
            echo "service_key=$SERVICE_KEY"
            echo "ok=true"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Using Supabase preview branch '$BRANCH' (ref: $BRANCH_REF)"

      # ── Docker fallback ───────────────────────────────────────────────────
      - name: Start local Supabase (Docker fallback)
        if: steps.try-branch.outputs.ok != 'true'
        run: |
          supabase start
          until pg_isready -h 127.0.0.1 -p 54322 -U postgres; do sleep 1; done

      # ── Migrations ────────────────────────────────────────────────────────
      - name: Push migrations to preview DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          BRANCH_OK: ${{ steps.try-branch.outputs.ok }}
          BRANCH_REF: ${{ steps.try-branch.outputs.branch_ref }}
        run: |
          if [ "$BRANCH_OK" = "true" ]; then
            supabase db push --project-ref "$BRANCH_REF"
          else
            supabase db push --db-url "$LOCAL_DB_URL"
          fi

      # ── Export Supabase connection for E2E ────────────────────────────────
      - name: Export Supabase env for E2E
        env:
          BRANCH_OK: ${{ steps.try-branch.outputs.ok }}
          BRANCH_API_URL: ${{ steps.try-branch.outputs.api_url }}
          BRANCH_ANON_KEY: ${{ steps.try-branch.outputs.anon_key }}
          BRANCH_SERVICE_KEY: ${{ steps.try-branch.outputs.service_key }}
        run: |
          if [ "$BRANCH_OK" = "true" ]; then
            {
              echo "NEXT_PUBLIC_SUPABASE_URL=$BRANCH_API_URL"
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$BRANCH_ANON_KEY"
              echo "SUPABASE_SERVICE_ROLE_KEY=$BRANCH_SERVICE_KEY"
            } >> "$GITHUB_ENV"
          else
            eval "$(supabase status -o env)"
            {
              echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
              echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            } >> "$GITHUB_ENV"
          fi

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Delete Supabase preview branch
        if: always() && steps.try-branch.outputs.ok == 'true'
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          BRANCH_NAME: ${{ steps.try-branch.outputs.branch_name }}
        run: |
          supabase branches delete "$BRANCH_NAME" \
            --experimental \
            --project-ref "$SUPABASE_PROJECT_ID"

  # ─────────────────────────────────────────────────────────────────────────────
  # MERGE TO MAIN: human approval gate + prod deploy
  #
  # Set up the "production-approval" environment before merging any migration:
  #   GitHub → repo Settings → Environments → New environment → "production-approval"
  #   Add Required reviewers (anyone who can approve a prod deploy).
  #   Optional: add a Wait timer (e.g. 5 min) for a soak window before deploy runs.
  #
  # await-approval pauses until a reviewer approves in the GitHub UI.
  # deploy-prod is automatically skipped on PR events because await-approval is
  # skipped (needs-dependency propagation — no extra `if:` required).
  # ─────────────────────────────────────────────────────────────────────────────
  await-approval:
    name: Await deployment approval
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: production-approval
    steps:
      - run: echo "Production deployment approved."

  deploy-prod:
    name: Deploy migrations to production
    runs-on: ubuntu-latest
    needs: await-approval
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Push migrations to production Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase db push --project-ref "$SUPABASE_PROJECT_ID"
