name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Required by the Zod env schema (shared/config/env.mjs) at build time
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      # Fails the job on high or critical vulnerabilities — no install needed; audit reads only the lockfile
      - run: pnpm audit --audit-level=high

  rls-lint:
    name: RLS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run RLS static analysis
        run: bash scripts/rls-lint.sh

  db-migrations:
    name: DB Migrations & Audit
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:54322/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.95.5

      - name: Install psql
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Start local Supabase
        run: |
          supabase start
          until pg_isready -h localhost -p 54322 -U postgres; do sleep 1; done

      - name: Check for schema drift
        run: |
          DIFF=$(supabase db diff 2>&1 | tr -d '[:space:]')
          if [ -n "$DIFF" ]; then
            echo "::error::Schema drift detected — DB schema does not match migration files."
            echo "Run 'pnpm supabase:db:diff' locally and create a migration to capture the changes."
            supabase db diff 2>&1 || true
            exit 1
          fi
          echo "No schema drift."

      - name: Audit FK indexes
        run: |
          MISSING=$(psql "$SUPABASE_DB_URL" \
            --tuples-only --no-align \
            -f scripts/db-audit-fk-indexes.sql) || {
            echo "::error::psql failed to connect or execute audit query."
            exit 1
          }
          if [ -n "$MISSING" ]; then
            echo "::error::FK columns without indexes (schema-foreign-key-indexes rule — HIGH):"
            printf "table_name\tfk_column\n%s\n" "$MISSING"
            echo "Fix: add CREATE INDEX in the same migration that adds the FK."
            exit 1
          fi
          echo "FK audit passed — all FK columns have indexes."

  test-rls:
    name: RLS pgTAP Tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.95.5

      - name: Start local Supabase
        run: |
          supabase start
          until pg_isready -h 127.0.0.1 -p 54322 -U postgres; do sleep 1; done

      - name: Run RLS pgTAP tests
        run: supabase test db --db-url "$SUPABASE_DB_URL"

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      # Playwright webServer starts dev on 3100; overrides workflow-level default
      NEXT_PUBLIC_APP_URL: http://localhost:3100
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rls-benchmark:
    name: RLS Performance Benchmark
    runs-on: ubuntu-latest
    # Non-blocking initially: collects baseline data without failing the pipeline.
    # Change to false once all 5 queries consistently pass the 20 ms threshold in CI.
    continue-on-error: true
    env:
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:54322/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.95.5

      - name: Install psql
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Start local Supabase
        run: |
          supabase start
          until pg_isready -h localhost -p 54322 -U postgres; do sleep 1; done

      - name: Run RLS benchmark
        run: psql "$SUPABASE_DB_URL" -f scripts/rls-benchmark.sql

  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build with bundle analyzer
        run: pnpm analyze

      - name: Check bundle sizes
        run: node scripts/check-bundle-sizes.mjs
