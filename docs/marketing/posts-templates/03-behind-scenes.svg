<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plantilla 03 — BEHIND THE SCENES
  ============================================
  Uso: posts narrativos del fundador en la calle / detrás de cámara.
       Ejemplo: "Hoy estuve charlando con Don Pedro, vendedor de helados hace 12 años…"
  Formato: 1080x1080 (Instagram feed cuadrado).

  Cómo usar:
  1. Abrí en Figma o Illustrator
  2. Reemplazá el rectángulo gris con foto de la escena (no retrato — escena de calle)
  3. Cambiá el texto del bloque inferior con tu narrativa del día
  4. Exportá
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;700;900&amp;display=swap');
    .display { font-family: 'Anton', Impact, sans-serif; letter-spacing: 0.02em; }
    .word { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .body { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.01em; }
    .label { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.3em; }
  </style>

  <rect width="1080" height="1080" fill="#FAF6EE"/>

  <!-- HEADER: logo + brand -->
  <g transform="translate(40, 50) scale(0.10)">
    <rect x="335" y="395" width="330" height="200" rx="6" fill="#F26B1F"/>
    <g stroke="#1A1A1A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="200" cy="280" r="48"/>
      <path d="M 200 328 L 200 355"/>
      <path d="M 200 505 L 145 675"/>
      <path d="M 220 505 L 280 675"/>
    </g>
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
      <path d="M 182 360 Q 210 330 240 360" fill="none"/>
    </g>
    <g stroke="#1A1A1A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 245 400 L 345 400"/>
      <rect x="335" y="395" width="330" height="200" rx="6"/>
      <path d="M 320 360 Q 500 180 680 360"/>
      <line x1="500" y1="270" x2="500" y2="395"/>
    </g>
    <g>
      <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="50"/>
      <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="50"/>
    </g>
  </g>
  <text x="155" y="105" class="word" font-size="38" fill="#1A1A1A">TUPUESTO</text>

  <!-- Tag DETRÁS DE CÁMARA -->
  <rect x="780" y="60" width="260" height="60" fill="#1A1A1A" rx="6"/>
  <text x="910" y="100" class="label" font-size="20" fill="#FAF6EE" text-anchor="middle" dominant-baseline="middle">DETRÁS DE CÁMARA</text>

  <!-- FOTO placeholder (escena de calle) -->
  <rect x="40" y="180" width="1000" height="500" fill="#E5DDD0" rx="8"/>
  <text x="540" y="410" class="word" font-size="28" fill="#999" text-anchor="middle">[FOTO DE LA ESCENA]</text>
  <text x="540" y="450" font-family="Inter" font-size="18" fill="#aaa" text-anchor="middle">Reemplazá con foto de la calle, el carrito, vos charlando</text>

  <!-- Bloque inferior con narrativa -->
  <rect x="40" y="720" width="1000" height="320" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="4" rx="8"/>

  <!-- Título del día -->
  <text x="80" y="790" class="display" font-size="48" fill="#F26B1F">HOY EN COSTANERA</text>

  <!-- Cuerpo de texto narrativo -->
  <text x="80" y="855" class="body" font-size="26" fill="#1A1A1A">Charlando con Don Pedro, vendedor de helados hace 12 años.</text>
  <text x="80" y="895" class="body" font-size="26" fill="#1A1A1A">"Cuando hace calor saco hasta 200, cuando llueve tiro la</text>
  <text x="80" y="935" class="body" font-size="26" fill="#1A1A1A">mitad", me dijo. Por eso le pinta esto del mapa.</text>
  <text x="80" y="975" class="body" font-size="26" fill="#1A1A1A">El 20 de junio activa.</text>

  <!-- Footer del cuadro -->
  <text x="80" y="1015" class="label" font-size="18" fill="#1A1A1A">PIONERO #04 · COSTANERA NORTE</text>
</svg>
