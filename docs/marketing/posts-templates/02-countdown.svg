<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plantilla 02 — COUNTDOWN
  ============================================
  Uso: posts de cuenta regresiva al 20J (5 hitos: día -30, -14, -7, -2, 0).
  Formato: 1080x1080 (Instagram feed cuadrado).

  Cómo usar:
  1. Abrí en Figma o Illustrator
  2. Cambiá el número GIGANTE: "12" → días restantes
  3. Cambiá el subtítulo si querés (default: "DÍAS PARA EL 20J")
  4. Exportá a PNG/JPG
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;700;900&amp;display=swap');
    .number { font-family: 'Anton', Impact, sans-serif; letter-spacing: -0.05em; }
    .display { font-family: 'Anton', Impact, sans-serif; letter-spacing: 0.04em; }
    .word { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .label { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.3em; }
    .small { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.2em; }
  </style>

  <!-- Background cream -->
  <rect width="1080" height="1080" fill="#FAF6EE"/>

  <!-- HEADER: logo chico arriba centrado -->
  <g transform="translate(440, 60) scale(0.16)">
    <rect x="335" y="395" width="330" height="200" rx="6" fill="#F26B1F"/>
    <g stroke="#1A1A1A" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="200" cy="280" r="48"/>
      <path d="M 200 328 L 200 355"/>
      <path d="M 200 505 L 145 675"/>
      <path d="M 220 505 L 280 675"/>
    </g>
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
      <path d="M 182 360 Q 210 330 240 360" fill="none"/>
    </g>
    <g stroke="#1A1A1A" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 245 400 L 345 400"/>
      <rect x="335" y="395" width="330" height="200" rx="6"/>
      <path d="M 320 360 Q 500 180 680 360"/>
      <line x1="500" y1="270" x2="500" y2="395"/>
    </g>
    <g>
      <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="38"/>
      <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="38"/>
    </g>
  </g>

  <text x="540" y="225" class="word" font-size="32" fill="#1A1A1A" text-anchor="middle">TUPUESTO</text>

  <!-- NÚMERO GIGANTE (centro) -->
  <text x="540" y="610" class="number" font-size="540" fill="#F26B1F" text-anchor="middle" dominant-baseline="middle">12</text>

  <!-- Subtítulo: "DÍAS PARA EL 20J" -->
  <text x="540" y="780" class="display" font-size="76" fill="#1A1A1A" text-anchor="middle">DÍAS PARA EL 20J</text>

  <!-- Detalles del evento -->
  <text x="540" y="870" class="label" font-size="28" fill="#1A1A1A" text-anchor="middle">SÁBADO 20 JUN · 16HS · COSTANERA</text>

  <!-- CTA -->
  <rect x="240" y="930" width="600" height="90" fill="#F26B1F" rx="8"/>
  <text x="540" y="975" class="display" font-size="44" fill="#FAF6EE" text-anchor="middle" dominant-baseline="middle">ANOTATE AL LANZAMIENTO</text>

  <!-- Tagline final -->
  <text x="540" y="1045" class="small" font-size="18" fill="#1A1A1A" text-anchor="middle">LINK EN BIO · DÍA DE LA BANDERA</text>
</svg>
