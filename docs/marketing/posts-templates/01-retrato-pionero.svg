<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plantilla 01 — RETRATO DE PIONERO
  ============================================
  Uso: para cada onboarding nuevo, presentar al vendedor (6-8 veces durante la campaña).
  Formato: 1080x1080 (Instagram feed cuadrado).

  Cómo usar:
  1. Abrí este SVG en Figma o Illustrator
  2. Reemplazá el rectángulo gris con la foto del vendedor (cuadrada o recortar a cuadrada)
  3. Cambiá los textos:
     - "BETO" → nombre del pionero
     - "PANCHOS · COSTANERA SUR · 15 AÑOS" → qué vende, zona, antigüedad
     - "#01" → número del pionero
  4. Exportá a PNG o JPG y subí a Instagram
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;700;900&amp;display=swap');
    .display { font-family: 'Anton', Impact, sans-serif; letter-spacing: 0.02em; }
    .word { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .body { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.1em; }
    .label { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.3em; }
  </style>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#FAF6EE"/>

  <!-- HEADER: logo + brand -->
  <g transform="translate(40, 50) scale(0.10)">
    <rect x="335" y="395" width="330" height="200" rx="6" fill="#F26B1F"/>
    <g stroke="#1A1A1A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="200" cy="280" r="48"/>
      <path d="M 200 328 L 200 355"/>
      <path d="M 200 505 L 145 675"/>
      <path d="M 220 505 L 280 675"/>
    </g>
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
      <path d="M 182 360 Q 210 330 240 360" fill="none"/>
    </g>
    <g stroke="#1A1A1A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 245 400 L 345 400"/>
      <rect x="335" y="395" width="330" height="200" rx="6"/>
      <path d="M 320 360 Q 500 180 680 360"/>
      <line x1="500" y1="270" x2="500" y2="395"/>
    </g>
    <g>
      <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="50"/>
      <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="50"/>
    </g>
  </g>

  <text x="155" y="105" class="word" font-size="38" fill="#1A1A1A">TUPUESTO</text>

  <!-- Tag PIONERO 20J · #N (esquina derecha) -->
  <rect x="800" y="60" width="240" height="60" fill="#F26B1F" rx="6"/>
  <text x="920" y="100" class="label" font-size="22" fill="#FAF6EE" text-anchor="middle" dominant-baseline="middle">PIONERO 20J · #01</text>

  <!-- FOTO placeholder (REEMPLAZAR ESTE RECTÁNGULO POR LA FOTO REAL) -->
  <rect x="40" y="180" width="1000" height="600" fill="#E5DDD0" rx="8"/>
  <text x="540" y="460" class="body" font-size="28" fill="#999" text-anchor="middle">[FOTO DEL PIONERO]</text>
  <text x="540" y="500" font-family="Inter" font-size="18" fill="#aaa" text-anchor="middle">Reemplazá este rectángulo con la foto cuadrada</text>

  <!-- Banda inferior naranja con info del vendedor -->
  <rect x="0" y="820" width="1080" height="260" fill="#F26B1F"/>

  <!-- Nombre del pionero -->
  <text x="540" y="900" class="display" font-size="92" fill="#FAF6EE" text-anchor="middle" dominant-baseline="middle">BETO</text>

  <!-- Subtítulo: qué vende, zona, años -->
  <text x="540" y="970" class="body" font-size="28" fill="#FAF6EE" text-anchor="middle">PANCHOS · COSTANERA SUR · 15 AÑOS</text>

  <!-- Tagline final -->
  <text x="540" y="1040" class="label" font-size="22" fill="#FAF6EE" text-anchor="middle">EL 20J ESTOY EN EL MAPA</text>
</svg>
