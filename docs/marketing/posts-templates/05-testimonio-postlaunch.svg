<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plantilla 05 — TESTIMONIO POST-LAUNCH
  ============================================
  Uso: posts con quote textual de un pionero después del 20J.
       Ejemplo: "Recibí 47 pedidos el sábado. Nunca pasó." — Beto
       Para usar en la semana 6-7 (post-launch capitalización).
  Formato: 1080x1080 (Instagram feed cuadrado).

  Cómo usar:
  1. Abrí en Figma o Illustrator
  2. Reemplazá la foto del pionero
  3. Cambiá la quote textual (en español rosarino, primera persona)
  4. Cambiá la atribución (nombre + qué vende)
  5. Exportá
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;700;900&amp;display=swap');
    .display { font-family: 'Anton', Impact, sans-serif; letter-spacing: 0.02em; }
    .word { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .quote { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.01em; }
    .label { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.3em; }
  </style>

  <rect width="1080" height="1080" fill="#FAF6EE"/>

  <!-- HEADER: logo + brand -->
  <g transform="translate(40, 50) scale(0.10)">
    <rect x="335" y="395" width="330" height="200" rx="6" fill="#F26B1F"/>
    <g stroke="#1A1A1A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="200" cy="280" r="48"/>
      <path d="M 200 328 L 200 355"/>
      <path d="M 200 505 L 145 675"/>
      <path d="M 220 505 L 280 675"/>
    </g>
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
      <path d="M 182 360 Q 210 330 240 360" fill="none"/>
    </g>
    <g stroke="#1A1A1A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 245 400 L 345 400"/>
      <rect x="335" y="395" width="330" height="200" rx="6"/>
      <path d="M 320 360 Q 500 180 680 360"/>
      <line x1="500" y1="270" x2="500" y2="395"/>
    </g>
    <g>
      <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="50"/>
      <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="50"/>
    </g>
  </g>
  <text x="155" y="105" class="word" font-size="38" fill="#1A1A1A">TUPUESTO</text>

  <!-- Tag POST-LANZAMIENTO -->
  <rect x="780" y="60" width="260" height="60" fill="#F26B1F" rx="6"/>
  <text x="910" y="100" class="label" font-size="20" fill="#FAF6EE" text-anchor="middle" dominant-baseline="middle">POST · LANZAMIENTO</text>

  <!-- FOTO del pionero (circular, lado izquierdo) -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="280" cy="500" r="200"/>
    </clipPath>
  </defs>
  <rect x="80" y="300" width="400" height="400" fill="#E5DDD0" clip-path="url(#circleClip)"/>
  <circle cx="280" cy="500" r="200" fill="none" stroke="#F26B1F" stroke-width="8"/>

  <!-- Indicador de foto placeholder (visible solo si no se reemplaza) -->
  <text x="280" y="495" class="word" font-size="22" fill="#999" text-anchor="middle">[FOTO]</text>
  <text x="280" y="525" font-family="Inter" font-size="14" fill="#aaa" text-anchor="middle">Pionero</text>

  <!-- Comilla decorativa grande -->
  <text x="540" y="370" class="display" font-size="180" fill="#F26B1F">"</text>

  <!-- QUOTE (textual del pionero) -->
  <text x="540" y="480" class="quote" font-size="42" fill="#1A1A1A">Recibí 47 pedidos</text>
  <text x="540" y="535" class="quote" font-size="42" fill="#1A1A1A">el sábado.</text>
  <text x="540" y="610" class="quote" font-size="42" fill="#F26B1F">Nunca me pasó algo</text>
  <text x="540" y="665" class="quote" font-size="42" fill="#F26B1F">así en 15 años.</text>

  <!-- Comilla cerrando -->
  <text x="990" y="720" class="display" font-size="120" fill="#F26B1F">"</text>

  <!-- ATRIBUCIÓN -->
  <line x1="540" y1="800" x2="650" y2="800" stroke="#1A1A1A" stroke-width="4"/>
  <text x="540" y="850" class="display" font-size="48" fill="#1A1A1A">BETO</text>
  <text x="540" y="895" class="label" font-size="22" fill="#1A1A1A">PANCHOS · COSTANERA SUR</text>

  <!-- Footer narrativo -->
  <rect x="0" y="970" width="1080" height="110" fill="#1A1A1A"/>
  <text x="540" y="1010" class="word" font-size="28" fill="#FAF6EE" text-anchor="middle">EL MAPA SIGUE PRENDIDO</text>
  <text x="540" y="1055" class="label" font-size="18" fill="#FAF6EE" text-anchor="middle">BAJATE LA APP · LINK EN BIO</text>
</svg>
