<?xml version="1.0" encoding="UTF-8"?>
<!--
  TuPuesto Sticker · 01 — PRE-LAUNCH · v2
  ============================================
  Período: 15 Mayo → 19 Junio 2026
  Tamaño físico recomendado: 9 x 9 cm (imprimir con sangrado 2mm)
  Material: vinilo mate o adhesivo papel laminado

  Cambios v2:
  · Header centrado y agrandado
  · Logo central del QR removido (escaneo más limpio)
  · CTA "ANOTATE AL LANZAMIENTO" centrado verticalmente en la caja naranja

  IMPORTANTE: el QR de este SVG es un PLACEHOLDER visual.
  Antes de imprimir, reemplazar el grupo "qr-placeholder" por un QR real
  generado con la URL del waitlist (ej: tupuesto.app/anotate).
-->
