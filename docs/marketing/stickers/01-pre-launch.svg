    .word { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .sub { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.25em; }
    .small { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.3em; }
