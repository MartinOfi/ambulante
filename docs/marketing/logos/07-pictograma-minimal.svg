<?xml version="1.0" encoding="UTF-8"?>
<!--
  TuPuesto Logo · 07 — Pictograma minimalista (simplified) · v3
  ============================================
  Concept: Versión simplificada para tamaños chicos (favicon 16x16).
           SIN productos, SIN franjas del toldo, delantal sin bolsillo.
           Mantiene la identidad pero solo elementos esenciales.
  Use cases: Favicon, watermark sutil, escalas pequeñas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&amp;display=swap');
    .word { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
  </style>

  <rect width="800" height="900" fill="#FAF6EE"/>

  <g transform="translate(150, 100) scale(0.6)">
    <!-- Persona -->
    <g stroke="#1A1A1A" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="200" cy="280" r="48"/>
      <path d="M 200 328 L 200 355"/>
      <path d="M 200 505 L 145 675"/>
      <path d="M 220 505 L 280 675"/>
    </g>

    <!-- Delantal simplificado (sin bolsillo) -->
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
      <path d="M 182 360 Q 210 330 240 360" fill="none"/>
    </g>

    <!-- Brazos + Carrito simplificado (sin franjas del toldo) -->
    <g stroke="#1A1A1A" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 245 400 L 345 400"/>
      <rect x="335" y="395" width="330" height="200" rx="6"/>
      <path d="M 320 360 Q 500 180 680 360"/>
      <line x1="500" y1="270" x2="500" y2="395"/>
    </g>

    <!-- 2 Ruedas (sin dot interior, más limpio) -->
    <g>
      <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="36"/>
      <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="36"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="400" y="780" class="word" font-size="100" fill="#1A1A1A" text-anchor="middle" dominant-baseline="middle">TUPUESTO</text>
</svg>
