<?xml version="1.0" encoding="UTF-8"?>
<!--
  TuPuesto Logo · 01 — Pictograma puro (logomark) · v3
  ============================================
  Concept: Solo el pictograma de vendedor con delantal empujando carrito.
           Sin texto. Para uso compacto.
  Mood: Pictográfico, universal, identificable.
  Colors: Charcoal stroke (#1A1A1A) sobre cream (#FAF6EE).
  Use cases: Favicon, app icon, PWA, avatar redes, watermark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#FAF6EE"/>

  <!-- PERSONA: cabeza + cuello + piernas -->
  <g stroke="#1A1A1A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="200" cy="280" r="48"/>
    <path d="M 200 328 L 200 355"/>
    <path d="M 200 505 L 145 675"/>
    <path d="M 220 505 L 280 675"/>
  </g>

  <!-- DELANTAL del vendedor -->
  <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
    <path d="M 182 360 Q 210 330 240 360" fill="none"/>
    <path d="M 192 440 L 232 440 L 232 470 L 192 470 Z" fill="none" stroke-width="16"/>
  </g>

  <!-- BRAZOS hacia el carrito -->
  <g stroke="#1A1A1A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 245 400 L 345 400"/>
  </g>

  <!-- CARRITO -->
  <g stroke="#1A1A1A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="335" y="395" width="330" height="200" rx="6"/>
    <line x1="535" y1="395" x2="535" y2="595"/>
    <path d="M 320 360 Q 500 180 680 360"/>
    <path d="M 405 308 L 405 360"/>
    <path d="M 500 270 L 500 360"/>
    <path d="M 595 308 L 595 360"/>
    <line x1="500" y1="270" x2="500" y2="395"/>
  </g>

  <!-- PRODUCTOS -->
  <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="385" cy="385" r="22"/>
    <circle cx="440" cy="375" r="22"/>
    <circle cx="565" cy="385" r="22"/>
    <circle cx="615" cy="375" r="22"/>
  </g>

  <!-- 2 RUEDAS -->
  <g>
    <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="22"/>
    <circle cx="410" cy="625" r="14" fill="#1A1A1A"/>
    <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="22"/>
    <circle cx="590" cy="625" r="14" fill="#1A1A1A"/>
  </g>
</svg>
