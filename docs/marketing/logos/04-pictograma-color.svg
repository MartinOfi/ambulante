<?xml version="1.0" encoding="UTF-8"?>
<!--
  TuPuesto Logo · 04 — Pictograma con color (carrito naranja) · v3
  ============================================
  Concept: Pictograma con CARRITO en naranja TuPuesto.
  Iteración 3: sin gorra, persona con DELANTAL de vendedor + 2 ruedas + pies alineados.
  Mood: Cálido, identificable, "esto es TuPuesto".
  Use cases: Branding hero, header principal, redes sociales destacadas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&amp;display=swap');
    .word { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .sub { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.3em; }
  </style>

  <rect width="800" height="900" fill="#FAF6EE"/>

  <g transform="translate(150, 80) scale(0.6)">
    <!-- CARRITO RELLENO NARANJA (fondo) -->
    <rect x="335" y="395" width="330" height="200" rx="6" fill="#F26B1F"/>

    <!-- PERSONA (cabeza + cuello + piernas) -->
    <g stroke="#1A1A1A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Cabeza -->
      <circle cx="200" cy="280" r="48"/>
      <!-- Cuello (línea corta entre cabeza y delantal) -->
      <path d="M 200 328 L 200 355"/>
      <!-- Pierna trasera (pies alineados a base de ruedas en y=675) -->
      <path d="M 200 505 L 145 675"/>
      <!-- Pierna delantera -->
      <path d="M 220 505 L 280 675"/>
    </g>

    <!-- DELANTAL (ropa del vendedor) -->
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
      <!-- Cuerpo trapezoidal del delantal -->
      <path d="M 178 360 L 244 360 L 258 510 L 162 510 Z"/>
      <!-- Banda del cuello del delantal (curva por encima del cuello) -->
      <path d="M 182 360 Q 210 330 240 360" fill="none"/>
      <!-- Bolsillo del delantal (detalle simple, opcional) -->
      <path d="M 192 440 L 232 440 L 232 470 L 192 470 Z" fill="none" stroke-width="20"/>
    </g>

    <!-- BRAZOS (salen del costado derecho del delantal hacia el carrito) -->
    <g stroke="#1A1A1A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 245 400 L 345 400"/>
    </g>

    <!-- CARRITO (detalles stroke sobre fill naranja) -->
    <g stroke="#1A1A1A" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="335" y="395" width="330" height="200" rx="6"/>
      <!-- Línea divisoria frontal del carrito -->
      <line x1="535" y1="395" x2="535" y2="595"/>
      <!-- Sombrilla / toldo -->
      <path d="M 320 360 Q 500 180 680 360"/>
      <!-- Franjas verticales del toldo -->
      <path d="M 405 308 L 405 360"/>
      <path d="M 500 270 L 500 360"/>
      <path d="M 595 308 L 595 360"/>
      <!-- Palo central de la sombrilla -->
      <line x1="500" y1="270" x2="500" y2="395"/>
    </g>

    <!-- PRODUCTOS arriba del carrito (rellenos cream con borde charcoal) -->
    <g fill="#FAF6EE" stroke="#1A1A1A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="385" cy="385" r="22"/>
      <circle cx="440" cy="375" r="22"/>
      <circle cx="565" cy="385" r="22"/>
      <circle cx="615" cy="375" r="22"/>
    </g>

    <!-- 2 RUEDAS (centradas debajo del carrito) -->
    <g>
      <!-- Rueda izquierda -->
      <circle cx="410" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="28"/>
      <circle cx="410" cy="625" r="14" fill="#1A1A1A"/>
      <!-- Rueda derecha -->
      <circle cx="590" cy="625" r="50" fill="#FAF6EE" stroke="#1A1A1A" stroke-width="28"/>
      <circle cx="590" cy="625" r="14" fill="#1A1A1A"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="400" y="730"
        class="word"
        font-size="100"
        fill="#1A1A1A"
        text-anchor="middle"
        dominant-baseline="middle">TUPUESTO</text>

  <text x="400" y="800"
        class="sub"
        font-size="22"
        fill="#1A1A1A"
        text-anchor="middle">ROSARIO · 2026</text>
</svg>
