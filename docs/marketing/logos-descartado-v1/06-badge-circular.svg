<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ambulante Logo · 06 — Badge Circular (Sello Rosarino)
  ============================================
  Concept: Sello tipo institución / cooperativa. Texto rodeando un símbolo.
  Mood: Tradicional, formal-festivo, "esto es serio".
  Colors: Charcoal + naranja accent + cream.
  Font: Inter Bold (texto curvo) + Inter Black (símbolo central).
  Use cases: Pieza institucional, packaging premium, Día D / press kit.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap');
    .label { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.3em; }
    .word { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .year { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.4em; }
  </style>

  <rect width="800" height="800" fill="#FAF6EE"/>

  <!-- Outer ring -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#1A1A1A" stroke-width="6"/>
  <!-- Inner ring -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Text path for top curve (AMBULANTE · ROSARIO) -->
  <defs>
    <path id="topCurve" d="M 120 400 A 280 280 0 0 1 680 400" fill="none"/>
    <path id="bottomCurve" d="M 680 400 A 280 280 0 0 1 120 400" fill="none"/>
  </defs>

  <!-- Top curved text -->
  <text class="label" font-size="34" fill="#1A1A1A">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">PIONEROS · 20 DE JUNIO · 2026</textPath>
  </text>

  <!-- Bottom curved text -->
  <text class="label" font-size="28" fill="#1A1A1A">
    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">DÍA DE LA BANDERA · ROSARIO</textPath>
  </text>

  <!-- Center symbol: stylized cart -->
  <g transform="translate(280, 290)">
    <!-- Cart body -->
    <rect x="20" y="55" width="200" height="80" fill="#F26B1F" rx="3"/>
    <!-- Canopy -->
    <path d="M 10 55 L 230 55 L 210 30 L 30 30 Z" fill="#F26B1F"/>
    <!-- Roof peak -->
    <rect x="115" y="18" width="10" height="14" fill="#F26B1F"/>
    <!-- Wheels -->
    <circle cx="55" cy="148" r="18" fill="#1A1A1A"/>
    <circle cx="185" cy="148" r="18" fill="#1A1A1A"/>
    <circle cx="55" cy="148" r="6" fill="#F26B1F"/>
    <circle cx="185" cy="148" r="6" fill="#F26B1F"/>
  </g>

  <!-- AMBULANTE wordmark below cart -->
  <text x="400" y="500"
        class="word"
        font-size="46"
        fill="#1A1A1A"
        text-anchor="middle">AMBULANTE</text>

  <!-- Decorative stars/dots -->
  <circle cx="140" cy="400" r="6" fill="#F26B1F"/>
  <circle cx="660" cy="400" r="6" fill="#F26B1F"/>
</svg>
