<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ambulante Logo · 08 — Símbolo Abstracto (forma orgánica)
  ============================================
  Concept: Forma orgánica que sugiere movimiento + ubicación.
           Una llama / gota / pin estilizado, abstracto pero cálido.
  Mood: Moderno, distintivo, memorable.
  Colors: Naranja (#F26B1F) + acento charcoal.
  Font: Inter Black.
  Use cases: Branding moderno, perfil corporativo, partnerships.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&amp;display=swap');
    .word { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 900; letter-spacing: -0.02em; }
    .sub { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.3em; }
  </style>

  <rect width="800" height="800" fill="#FAF6EE"/>

  <!-- Organic symbol: combination of flame/teardrop/pin -->
  <g transform="translate(320, 150)">
    <!-- Main shape: asymmetric organic teardrop -->
    <path d="M 80 0
             C 30 30 0 80 0 130
             C 0 175 25 210 80 280
             C 110 240 145 200 160 165
             C 175 130 170 90 145 55
             C 130 35 110 15 80 0 Z"
          fill="#F26B1F"/>

    <!-- Inner dot (pin-like) -->
    <circle cx="80" cy="110" r="20" fill="#FAF6EE"/>
    <circle cx="80" cy="110" r="8" fill="#1A1A1A"/>
  </g>

  <!-- Wordmark below symbol -->
  <text x="400" y="540"
        class="word"
        font-size="80"
        fill="#1A1A1A"
        text-anchor="middle"
        dominant-baseline="middle">AMBULANTE</text>

  <!-- Tagline -->
  <text x="400" y="600"
        class="sub"
        font-size="18"
        fill="#1A1A1A"
        text-anchor="middle">ROSARIO · 2026</text>
</svg>
